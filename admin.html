<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinh Hg VPN - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); border-radius: 1.5rem; }
        .gradient-text { background: linear-gradient(135deg, #4f46e5, #9333ea); -webkit-background-clip: text; color: transparent; }
        .dev-btn.active { border-color: #4f46e5; background-color: #e0e7ff; color: #4338ca; }
    </style>
</head>
<body class="min-h-screen">
    <div id="toastContainer" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3"></div>

    <div id="loginScreen" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center">
        <div class="glass-card p-10 w-11/12 max-w-sm text-center">
            <h2 class="text-2xl font-extrabold mb-8 text-slate-800">Admin Panel</h2>
            <input type="password" id="adminPass" class="w-full bg-slate-100 rounded-xl p-4 text-center mb-4 outline-none font-bold tracking-widest" placeholder="Mật khẩu...">
            <button onclick="checkAdmin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden max-w-7xl mx-auto p-4 md:p-8 pb-20">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
            <h1 class="text-2xl font-extrabold"><span class="gradient-text">Trinh Hg VPN</span> Dashboard</h1>
            <button onclick="location.reload()" class="bg-red-50 text-red-600 hover:bg-red-100 px-5 py-2.5 rounded-xl font-bold transition">Đăng xuất</button>
        </div>

        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="switchTab('tab-orders')" id="btn-tab-orders" class="px-6 py-3 rounded-xl font-bold bg-indigo-600 text-white shadow-md">📦 Quản lý Đơn hàng</button>
            <button onclick="switchTab('tab-cms')" id="btn-tab-cms" class="px-6 py-3 rounded-xl font-bold bg-white text-slate-600 border border-slate-200">🛠️ Cấu hình Hướng dẫn</button>
        </div>

        <div id="tab-orders">
            <button onclick="openEditModal(null)" class="mb-4 bg-indigo-100 text-indigo-700 font-bold px-6 py-3 rounded-xl hover:bg-indigo-200 transition"><i class="fas fa-plus mr-2"></i>Tạo Đơn Thủ Công</button>
            <div class="glass-card overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap min-w-[800px]">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-200">
                        <tr><th class="p-5">Mã Đơn</th><th class="p-5">Thông tin Khách</th><th class="p-5">Gói VPN</th><th class="p-5">Trạng Thái</th><th class="p-5 text-right">Hành động</th></tr>
                    </thead>
                    <tbody id="orderTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-cms" class="hidden glass-card p-6 md:p-8">
            <h2 class="text-2xl font-bold mb-6">Trình Soạn thảo Hướng dẫn</h2>
            
            <div class="flex flex-wrap gap-3 mb-6">
                <button onclick="changeCmsDevice('android')" id="cms-btn-android" class="dev-btn active border-2 border-slate-200 px-6 py-3 rounded-xl font-bold text-slate-600 flex items-center transition"><i class="fab fa-android text-green-500 text-xl mr-2"></i> Android</button>
                <button onclick="changeCmsDevice('windows')" id="cms-btn-windows" class="dev-btn border-2 border-slate-200 px-6 py-3 rounded-xl font-bold text-slate-600 flex items-center transition"><i class="fab fa-windows text-blue-500 text-xl mr-2"></i> Windows</button>
                <button onclick="changeCmsDevice('macos')" id="cms-btn-macos" class="dev-btn border-2 border-slate-200 px-6 py-3 rounded-xl font-bold text-slate-600 flex items-center transition"><i class="fab fa-apple text-slate-800 text-xl mr-2"></i> MacOS</button>
                <button onclick="changeCmsDevice('ios')" id="cms-btn-ios" class="dev-btn border-2 border-slate-200 px-6 py-3 rounded-xl font-bold text-slate-600 flex items-center transition"><i class="fab fa-app-store-ios text-blue-400 text-xl mr-2"></i> iOS</button>
            </div>
            
            <div class="bg-slate-50 p-4 rounded-t-xl border border-slate-200 border-b-0 flex gap-2 flex-wrap">
                <button onclick="insertMacro('btn')" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-bold text-indigo-600"><i class="fas fa-download mr-1"></i> Nút Tải</button>
                <button onclick="insertMacro('title')" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-bold text-slate-700"><i class="fas fa-heading mr-1"></i> Tiêu Đề</button>
                <button onclick="insertMacro('step')" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-bold text-slate-700"><i class="fas fa-list-ol mr-1"></i> Bước cài</button>
                <button onclick="insertMacro('img')" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-bold text-pink-600"><i class="fas fa-image mr-1"></i> Ảnh</button>
            </div>
            <textarea id="cmsGuide" rows="14" class="w-full p-5 border border-slate-200 rounded-b-xl focus:outline-none text-slate-800 bg-white shadow-inner font-mono text-sm leading-relaxed" placeholder="Soạn nội dung ở đây..."></textarea>
            
            <button onclick="saveCms()" class="mt-4 bg-indigo-600 text-white font-bold px-8 py-4 rounded-xl shadow-md w-full md:w-auto">💾 LƯU LÊN WEB</button>
        </div>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card p-6 md:p-8 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-bold mb-6" id="modalTitle">Chỉnh sửa Đơn Hàng</h3>
            
            <div class="grid md:grid-cols-2 gap-4 mb-4">
                <div><label class="block font-bold text-sm mb-1 text-slate-600">Mã Đơn Hàng</label><input type="text" id="editId" class="w-full p-3 border rounded-lg bg-slate-100 font-mono font-bold" readonly></div>
                <div><label class="block font-bold text-sm mb-1 text-slate-600">Email Khách</label><input type="text" id="editEmail" class="w-full p-3 border rounded-lg outline-none focus:border-indigo-500"></div>
            </div>

            <div class="mb-4">
                <label class="block font-bold text-sm mb-1 text-slate-600">Gói VPN (Giá + Dung lượng)</label>
                <select id="editPkg" class="w-full p-3 border rounded-lg font-bold text-indigo-700 bg-indigo-50 outline-none"></select>
            </div>

            <div class="mb-6">
                <label class="block font-bold text-sm mb-1 text-slate-600">Trạng Thái Đơn</label>
                <select id="editStatus" class="w-full p-3 border rounded-lg font-bold outline-none" onchange="toggleStatusFields()">
                    <option value="pending">⏳ Đang chờ duyệt (Pending)</option>
                    <option value="success">✅ Kích hoạt Thành công (Cấp Link)</option>
                    <option value="failed">❌ Bị Từ chối / Lỗi</option>
                </select>
            </div>

            <div id="fieldSuccess" class="hidden mb-6 p-4 border-l-4 border-green-500 bg-green-50 rounded-r-lg">
                <label class="block font-bold text-sm mb-1 text-green-700">Link Đăng Ký (Subscription URL)</label>
                <input type="text" id="editLink" class="w-full p-3 border border-green-200 rounded-lg font-mono text-sm outline-none" placeholder="Dán link VPN vào đây...">
            </div>

            <div id="fieldFailed" class="hidden mb-6 p-4 border-l-4 border-red-500 bg-red-50 rounded-r-lg">
                <label class="block font-bold text-sm mb-1 text-red-700">Lý do từ chối (Gửi cho khách)</label>
                <input type="text" id="editReason" class="w-full p-3 border border-red-200 rounded-lg outline-none" placeholder="Ví dụ: Đơn hàng bị hủy do không thanh toán...">
            </div>

            <div class="flex items-center mb-6 bg-slate-50 border border-slate-200 p-4 rounded-lg">
                <input type="checkbox" id="sendMailCheck" class="w-5 h-5 mr-3 accent-indigo-600" checked>
                <label for="sendMailCheck" class="font-bold text-sm text-slate-700">Gửi Email thông báo trạng thái cho khách sau khi Lưu</label>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <button onclick="saveOrder()" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700">💾 LƯU ĐƠN HÀNG</button>
                <button onclick="document.getElementById('modalEdit').classList.add('hidden')" class="bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-blue-500' : 'bg-green-500');
            const icon = type === 'error' ? 'fa-times-circle' : (type === 'info' ? 'fa-info-circle' : 'fa-check-circle');
            toast.className = `${bg} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<i class="fas ${icon} text-xl mr-3"></i><span class="font-bold text-sm">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        const DB_KEY = 'vpn_orders_db';
        const GOOGLE_MAIL_API = "https://script.google.com/macros/s/AKfycbyQjEln9By0HuUPtboqJpb1INI6rRp52BxvHR8HaE5fs8qojfgau1R_27P4RyLLxXIp/exec";
        let ordersDb = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let currentCmsDevice = 'android';

        const packageOptions = [
            "Gói 1 Tháng - 70.000đ (1000GB)", "Gói Cao Cấp - 150.000đ (3000GB)", "Gói 1 Năm - 300.000đ (200GB/tháng)",
            "Không Giới Hạn - 70.000đ (200GB)", "Không Giới Hạn - 180.000đ (2000GB)", "Không Giới Hạn - 320.000đ (6000GB)"
        ];

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "admin2026") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('editPkg').innerHTML = packageOptions.map(p => `<option value="${p}">${p}</option>`).join('');
                renderOrders(); loadCmsData(); showToast("Đăng nhập thành công!");
            } else showToast("Sai mật khẩu!", "error");
        }

        function switchTab(t) {
            document.getElementById('tab-orders').classList.add('hidden'); document.getElementById('tab-cms').classList.add('hidden');
            document.getElementById(t).classList.remove('hidden');
            document.getElementById('btn-tab-orders').className = "px-6 py-3 rounded-xl font-bold bg-white text-slate-600 border border-slate-200";
            document.getElementById('btn-tab-cms').className = "px-6 py-3 rounded-xl font-bold bg-white text-slate-600 border border-slate-200";
            document.getElementById('btn-'+t).className = "px-6 py-3 rounded-xl font-bold bg-indigo-600 text-white shadow-md";
        }

        function renderOrders() {
            ordersDb = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const tbody = document.getElementById('orderTable'); tbody.innerHTML = '';
            ordersDb.forEach((o) => {
                let badge = o.status === 'pending' ? '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">⏳ Chờ duyệt</span>' : 
                            (o.status === 'success' ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200">✅ Thành công</span>' : 
                            '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200">❌ Từ chối</span>');
                
                let supportTag = o.needSupport ? `<span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded ml-2 font-bold uppercase border border-blue-200">Hỗ trợ Cài đặt</span>` : '';

                tbody.innerHTML += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-5 font-mono font-bold text-indigo-600">${o.id}</td>
                    <td class="p-5"><p class="font-bold text-slate-800">${o.email} ${supportTag}</p><p class="text-xs text-slate-400 mt-1"><i class="fas fa-phone mr-1"></i> ${o.zalo || 'Không'}</p></td>
                    <td class="p-5 font-bold text-slate-600">${o.pkg}</td>
                    <td class="p-5">${badge}</td>
                    <td class="p-5 text-right whitespace-nowrap">
                        <button onclick="openEditModal('${o.id}')" class="text-indigo-600 font-bold hover:underline px-3 py-1 bg-indigo-50 rounded mr-2"><i class="fas fa-edit mr-1"></i>Sửa</button>
                        <button onclick="deleteOrder('${o.id}')" class="text-red-500 font-bold hover:underline px-3 py-1 bg-red-50 rounded"><i class="fas fa-trash-alt mr-1"></i>Xóa</button>
                    </td>
                </tr>`;
            });
        }

        function deleteOrder(id) {
            if(confirm('CẢNH BÁO: Xóa vĩnh viễn đơn hàng ' + id + '?')) {
                ordersDb = ordersDb.filter(x => x.id !== id);
                localStorage.setItem(DB_KEY, JSON.stringify(ordersDb));
                renderOrders(); showToast("Đã xóa thành công!", "info");
            }
        }

        function openEditModal(id) {
            let o;
            if (id) {
                o = ordersDb.find(x => x.id === id);
                document.getElementById('modalTitle').innerText = `Cập nhật Đơn Hàng`;
                document.getElementById('editId').value = o.id;
            } else {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let newId = 'DH-'; for(let i=0; i<10; i++) newId += chars.charAt(Math.floor(Math.random()*chars.length));
                o = { id: newId, email: '', pkg: packageOptions[0], status: 'pending', info: '', reason: '' };
                document.getElementById('modalTitle').innerText = `Tạo Đơn Thủ Công`;
                document.getElementById('editId').value = o.id;
            }
            document.getElementById('editEmail').value = o.email || '';
            document.getElementById('editPkg').value = o.pkg;
            document.getElementById('editStatus').value = o.status;
            document.getElementById('editLink').value = o.info || '';
            document.getElementById('editReason').value = o.reason || '';
            toggleStatusFields(); document.getElementById('modalEdit').classList.remove('hidden');
        }

        function toggleStatusFields() {
            const s = document.getElementById('editStatus').value;
            document.getElementById('fieldSuccess').classList.toggle('hidden', s !== 'success');
            document.getElementById('fieldFailed').classList.toggle('hidden', s !== 'failed');
        }

        async function saveOrder() {
            const id = document.getElementById('editId').value;
            let o = ordersDb.find(x => x.id === id);
            if(!o) { o = { id: id, needSupport: false, date: new Date().toLocaleString() }; ordersDb.unshift(o); }

            o.email = document.getElementById('editEmail').value;
            o.pkg = document.getElementById('editPkg').value;
            o.status = document.getElementById('editStatus').value;
            o.info = document.getElementById('editLink').value;
            o.reason = document.getElementById('editReason').value;

            localStorage.setItem(DB_KEY, JSON.stringify(ordersDb));
            
            if(document.getElementById('sendMailCheck').checked && o.email) {
                const btn = event.target; const oldTxt = btn.innerText; btn.innerText = "ĐANG GỬI EMAIL..."; btn.disabled = true;
                let subject = "Trinh Hg VPN - Cập nhật đơn hàng"; let msg = "";
                
                let contactBlock = `<div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:20px; margin-top:25px; text-align:center;">
                    <p style="margin:0 0 10px 0; color:#475569; font-size:14px;">${o.needSupport ? '<span style="color:#ef4444; font-weight:bold;">Bạn đã yêu cầu Admin call hỗ trợ cài đặt!</span> Vui lòng liên hệ ngay:' : 'Cần hỗ trợ? Đội ngũ của chúng tôi sẵn sàng 24/7'}</p>
                    <a href="https://zalo.me/0917678211" style="display:inline-block; background:#0ea5e9; color:white; padding:10px 20px; text-decoration:none; border-radius:8px; font-weight:bold; margin-right:10px;">Chat Zalo</a>
                    <a href="https://www.facebook.com/trinh.hg.57" style="display:inline-block; background:#3b82f6; color:white; padding:10px 20px; text-decoration:none; border-radius:8px; font-weight:bold;">Chat Messenger</a>
                </div>`;

                if(o.status === 'success') {
                    subject = "Trinh Hg VPN - Kích hoạt dịch vụ thành công";
                    msg = `<div style="font-family:sans-serif; max-width:600px; margin:auto; background:#ffffff; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden;">
                        <div style="background:linear-gradient(135deg, #4f46e5, #9333ea); padding:20px; text-align:center;"><h2 style="color:white; margin:0; font-size:22px;">KÍCH HOẠT THÀNH CÔNG</h2></div>
                        <div style="padding:30px;">
                            <p>Xin chào, Gói VPN <b>${o.pkg}</b> của bạn đã sẵn sàng.</p>
                            <div style="background:#f1f5f9; border-left:4px solid #4f46e5; padding:15px; border-radius:8px; margin:20px 0; text-align:center;">
                                <p style="margin:0; font-size:12px; color:#64748b; font-weight:bold;">MÃ ĐƠN HÀNG</p>
                                <p style="margin:5px 0 0 0; font-size:26px; font-weight:900; color:#4f46e5; word-break:break-all; letter-spacing:1px;">${o.id}</p>
                            </div>
                            <div style="text-align:center; margin:25px 0;">
                                <a href="https://vpntrinhhg.pages.dev" style="background:#1e293b; color:white; padding:12px 25px; border-radius:8px; text-decoration:none; font-weight:bold;">TRUY CẬP CỔNG KHÁCH HÀNG</a>
                                <p style="font-size:13px; color:#64748b; margin-top:15px;">👉 <i>Tra cứu bằng <b>Mã Đơn Hàng</b> hoặc <b>Email</b> đều được nhé!</i></p>
                            </div>
                            ${contactBlock}
                        </div></div>`;
                } else if(o.status === 'failed') {
                    subject = "Trinh Hg VPN - Đơn hàng bị từ chối";
                    msg = `<div style="font-family:sans-serif; max-width:600px; margin:auto; border:1px solid #fecaca; border-radius:16px; overflow:hidden;">
                        <div style="background:#ef4444; padding:20px; text-align:center;"><h2 style="color:white; margin:0;">Giao dịch thất bại</h2></div>
                        <div style="padding:30px;"><p>Xin chào, Đơn hàng <b>${o.id}</b> của bạn không thể kích hoạt.</p><div style="background:#fef2f2; border:1px solid #fca5a5; padding:15px; border-radius:8px; color:#b91c1c; font-weight:bold; margin:20px 0;">Lý do: ${o.reason}</div>${contactBlock}</div></div>`;
                }

                try {
                    await fetch(GOOGLE_MAIL_API, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({to: o.email, subject: subject, html: msg}) });
                    showToast("Đã lưu và Gửi Email Thành Công!");
                } catch(e) { showToast("Lỗi khi gửi API Email!", "error"); }
                
                btn.innerText = oldTxt; btn.disabled = false;
            } else showToast("Đã lưu thành công (Không gửi mail)!");

            renderOrders(); document.getElementById('modalEdit').classList.add('hidden');
        }

        // --- CMS TOOLBAR ---
        function changeCmsDevice(dev) {
            document.querySelectorAll('.dev-btn').forEach(b => { b.classList.remove('active', 'border-indigo-500', 'bg-indigo-50', 'text-indigo-700'); b.classList.add('border-slate-200', 'text-slate-600'); });
            document.getElementById('cms-btn-' + dev).classList.add('active', 'border-indigo-500', 'bg-indigo-50', 'text-indigo-700'); document.getElementById('cms-btn-' + dev).classList.remove('border-slate-200', 'text-slate-600');
            currentCmsDevice = dev; document.getElementById('cmsGuide').value = localStorage.getItem('cms_' + dev + '_guide') || '';
        }

        function insertMacro(type) {
            const box = document.getElementById('cmsGuide'); let str = "";
            if(type === 'btn') str = `<a href="LINK-APP" target="_blank" style="display:inline-block; background:#4f46e5; color:white; padding:12px 24px; border-radius:8px; font-weight:bold; text-decoration:none; margin-right:10px; margin-bottom:10px;">⬇️ TẢI APP</a>\n`;
            if(type === 'title') str = `\n<h3 style="font-size: 18px; font-weight: bold; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-top: 24px;">Tiêu đề hướng dẫn</h3>\n`;
            if(type === 'step') str = `<p style="margin-bottom: 10px;"><b>Bước 1:</b> Viết nội dung...</p>\n`;
            if(type === 'img') str = `\n<img src="LINK-ANH-JPG" style="max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #ccc;" />\n`;
            box.value += str;
        }

        function saveCms() {
            localStorage.setItem('cms_' + currentCmsDevice + '_guide', document.getElementById('cmsGuide').value);
            showToast('Đã lưu bài viết lên Web Khách Hàng!');
        }
    </script>
</body>
</html>
