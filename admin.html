<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinh Hg VPN - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); border-radius: 1.5rem; }
        .gradient-text { background: linear-gradient(135deg, #4f46e5, #9333ea); -webkit-background-clip: text; color: transparent; }
        .dev-btn.active { border-color: #4f46e5; background-color: #e0e7ff; color: #4338ca; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div id="toastContainer" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3"></div>

    <div id="loginScreen" class="fixed inset-0 bg-slate-50 z-50 flex items-center justify-center p-4">
        <div class="glass-card p-8 md:p-10 w-full max-w-sm text-center">
            <h2 class="text-2xl font-extrabold mb-8 text-slate-800">Admin Panel</h2>
            <input type="password" id="adminPass" class="w-full bg-slate-100 rounded-xl p-4 text-center mb-4 outline-none font-bold tracking-widest" placeholder="Mật khẩu...">
            <button onclick="checkAdmin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100 gap-4">
            <h1 class="text-xl md:text-2xl font-extrabold"><span class="gradient-text">Trinh Hg VPN</span> Dashboard</h1>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="fetchOrders()" class="flex-1 md:flex-none bg-indigo-50 text-indigo-600 hover:bg-indigo-100 px-4 py-2.5 rounded-xl font-bold text-sm transition"><i class="fas fa-sync-alt mr-2"></i>Làm mới</button>
                <button onclick="location.reload()" class="flex-1 md:flex-none bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl font-bold text-sm transition">Đăng xuất</button>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="switchTab('tab-orders')" id="btn-tab-orders" class="flex-1 md:flex-none px-5 py-3 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-md">📦 Đơn hàng</button>
            <button onclick="switchTab('tab-cms')" id="btn-tab-cms" class="flex-1 md:flex-none px-5 py-3 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200">🛠️ Soạn Hướng dẫn</button>
        </div>

        <div id="tab-orders">
            <button onclick="openEditModal(null)" class="mb-4 bg-indigo-100 text-indigo-700 font-bold px-5 py-2.5 rounded-xl text-sm hover:bg-indigo-200 transition"><i class="fas fa-plus mr-2"></i>Tạo Đơn Thủ Công</button>
            <div class="glass-card overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap min-w-[800px]">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-200">
                        <tr><th class="p-4 md:p-5">Mã Đơn</th><th class="p-4 md:p-5">Thông tin Khách</th><th class="p-4 md:p-5">Gói VPN</th><th class="p-4 md:p-5">Trạng Thái</th><th class="p-4 md:p-5 text-right">Hành động</th></tr>
                    </thead>
                    <tbody id="orderTable" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-cms" class="hidden glass-card p-5 md:p-8">
            <h2 class="text-xl font-bold mb-4">Soạn thảo Hướng dẫn</h2>
            
            <div class="flex flex-wrap gap-2 mb-4">
                <button onclick="changeCmsDevice('android')" id="cms-btn-android" class="dev-btn active border-2 border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-600 text-sm flex items-center transition"><i class="fab fa-android text-green-500 mr-2"></i> Android</button>
                <button onclick="changeCmsDevice('windows')" id="cms-btn-windows" class="dev-btn border-2 border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-600 text-sm flex items-center transition"><i class="fab fa-windows text-blue-500 mr-2"></i> Windows</button>
                <button onclick="changeCmsDevice('macos')" id="cms-btn-macos" class="dev-btn border-2 border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-600 text-sm flex items-center transition"><i class="fab fa-apple text-slate-800 mr-2"></i> MacOS</button>
                <button onclick="changeCmsDevice('ios')" id="cms-btn-ios" class="dev-btn border-2 border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-600 text-sm flex items-center transition"><i class="fab fa-app-store-ios text-blue-400 mr-2"></i> iOS</button>
            </div>
            
            <div class="bg-slate-50 p-3 rounded-t-xl border border-slate-200 border-b-0 flex gap-2 flex-wrap">
                <button onclick="insertMacro('btn')" class="bg-white border shadow-sm px-3 py-1.5 rounded-lg text-xs font-bold text-indigo-600"><i class="fas fa-download mr-1"></i> Nút Tải</button>
                <button onclick="insertMacro('title')" class="bg-white border shadow-sm px-3 py-1.5 rounded-lg text-xs font-bold text-slate-700"><i class="fas fa-heading mr-1"></i> Tiêu Đề</button>
                <button onclick="insertMacro('step')" class="bg-white border shadow-sm px-3 py-1.5 rounded-lg text-xs font-bold text-slate-700"><i class="fas fa-list-ol mr-1"></i> Bước cài</button>
                <button onclick="insertMacro('img')" class="bg-white border shadow-sm px-3 py-1.5 rounded-lg text-xs font-bold text-pink-600"><i class="fas fa-image mr-1"></i> Ảnh</button>
            </div>
            <textarea id="cmsGuide" rows="12" class="w-full p-4 border border-slate-200 rounded-b-xl focus:outline-none text-slate-800 bg-white shadow-inner font-mono text-sm leading-relaxed" placeholder="Soạn nội dung HTML vào đây..."></textarea>
            
            <button onclick="saveCmsToCloud()" class="mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-xl shadow-md w-full md:w-auto transition">💾 LƯU LÊN MÁY CHỦ</button>
        </div>
    </div>

    <div id="modalEdit" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card p-5 md:p-8 w-full max-w-2xl max-h-[95vh] overflow-y-auto">
            <h3 class="text-xl md:text-2xl font-bold mb-4 md:mb-6" id="modalTitle">Chỉnh sửa Đơn Hàng</h3>
            
            <div class="grid md:grid-cols-2 gap-3 md:gap-4 mb-3 md:mb-4">
                <div><label class="block font-bold text-xs md:text-sm mb-1 text-slate-600">Mã Đơn</label><input type="text" id="editId" class="w-full p-2.5 md:p-3 text-sm border rounded-lg bg-slate-100 font-mono font-bold" readonly></div>
                <div><label class="block font-bold text-xs md:text-sm mb-1 text-slate-600">Email Khách</label><input type="text" id="editEmail" class="w-full p-2.5 md:p-3 text-sm border rounded-lg outline-none focus:border-indigo-500"></div>
            </div>

            <div class="mb-3 md:mb-4">
                <label class="block font-bold text-xs md:text-sm mb-1 text-slate-600">Gói VPN Khách Chọn</label>
                <select id="editPkg" class="w-full p-2.5 md:p-3 text-sm border rounded-lg font-bold text-indigo-700 bg-indigo-50 outline-none"></select>
            </div>

            <div class="mb-4 md:mb-6">
                <label class="block font-bold text-xs md:text-sm mb-1 text-slate-600">Trạng Thái Đơn</label>
                <select id="editStatus" class="w-full p-2.5 md:p-3 text-sm border rounded-lg font-bold outline-none" onchange="toggleStatusFields()">
                    <option value="pending">⏳ Đang chờ duyệt (Pending)</option>
                    <option value="success">✅ Kích hoạt Thành công (Cấp Link)</option>
                    <option value="failed">❌ Bị Từ chối / Lỗi</option>
                </select>
            </div>

            <div id="fieldSuccess" class="hidden mb-4 md:mb-6 p-3 md:p-4 border-l-4 border-green-500 bg-green-50 rounded-r-lg">
                <label class="block font-bold text-xs md:text-sm mb-1 text-green-700">Link Đăng Ký (Subscription URL)</label>
                <input type="text" id="editLink" class="w-full p-2.5 md:p-3 text-sm border border-green-200 rounded-lg font-mono outline-none" placeholder="Dán link VPN vào đây...">
            </div>

            <div id="fieldFailed" class="hidden mb-4 md:mb-6 p-3 md:p-4 border-l-4 border-red-500 bg-red-50 rounded-r-lg">
                <label class="block font-bold text-xs md:text-sm mb-1 text-red-700">Lý do từ chối (Gửi cho khách)</label>
                <input type="text" id="editReason" class="w-full p-2.5 md:p-3 text-sm border border-red-200 rounded-lg outline-none" placeholder="Ví dụ: Chưa nhận được tiền...">
            </div>

            <div class="flex items-center mb-5 md:mb-6 bg-slate-50 border border-slate-200 p-3 rounded-lg">
                <input type="checkbox" id="sendMailCheck" class="w-4 h-4 md:w-5 md:h-5 mr-3 accent-indigo-600" checked>
                <label for="sendMailCheck" class="font-bold text-xs md:text-sm text-slate-700 leading-tight">Gửi Email thông báo trạng thái cho khách</label>
            </div>

            <div class="flex flex-col md:flex-row gap-2 md:gap-3">
                <button onclick="saveOrderToCloud()" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition text-sm md:text-base">💾 LƯU LÊN MÁY CHỦ</button>
                <button onclick="document.getElementById('modalEdit').classList.add('hidden')" class="bg-slate-200 text-slate-700 font-bold py-3 md:px-6 rounded-lg hover:bg-slate-300 text-sm md:text-base">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://vpn-api.doicucden.workers.dev"; 
        const GOOGLE_MAIL_API = "https://script.google.com/macros/s/AKfycbyQjEln9By0HuUPtboqJpb1INI6rRp52BxvHR8HaE5fs8qojfgau1R_27P4RyLLxXIp/exec";
        
        let ordersDb = []; let cmsDb = {}; let currentCmsDevice = 'android';
        let refreshInterval;

        // ĐẦY ĐỦ TÊN GÓI ĐỂ ADMIN CHỌN LẠI CHO CHUẨN
        const packageOptions = [
            "Gói 1 Tháng - 70.000đ / 3$ (1000GB)",
            "Gói Cao Cấp - 150.000đ / 6$ (3000GB)",
            "Gói 1 Năm - 300.000đ / 12$ (200GB/tháng)",
            "Không Giới Hạn - 70.000đ / 3$ (200GB)",
            "Không Giới Hạn - 180.000đ / 7$ (2000GB)",
            "Không Giới Hạn - 320.000đ / 13$ (6000GB)"
        ];

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-blue-500' : 'bg-green-500');
            const icon = type === 'error' ? 'fa-times-circle' : (type === 'info' ? 'fa-info-circle' : 'fa-check-circle');
            toast.className = `${bg} text-white px-4 md:px-6 py-3 md:py-4 rounded-xl shadow-2xl flex items-center transform transition-all duration-300 translate-x-full opacity-0 w-[90vw] max-w-sm mb-2`;
            toast.innerHTML = `<i class="fas ${icon} text-lg md:text-xl mr-3 shrink-0"></i><span class="font-bold text-sm leading-tight">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        async function checkAdmin() {
            if(document.getElementById('adminPass').value === "admin2026") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                
                // Fill Dropbox Package
                document.getElementById('editPkg').innerHTML = packageOptions.map(p => `<option value="${p}">${p}</option>`).join('');
                
                showToast("Đăng nhập thành công, đang tải dữ liệu...", "info");
                await fetchOrders(); await fetchCms();

                // REAL-TIME POLLING: Cập nhật ngầm mỗi 10 giây
                refreshInterval = setInterval(async () => {
                    if(document.getElementById('modalEdit').classList.contains('hidden')) {
                        await fetchOrdersSilently();
                    }
                }, 10000);

            } else showToast("Sai mật khẩu!", "error");
        }

        function switchTab(t) {
            document.getElementById('tab-orders').classList.add('hidden'); document.getElementById('tab-cms').classList.add('hidden');
            document.getElementById(t).classList.remove('hidden');
            document.getElementById('btn-tab-orders').className = "flex-1 md:flex-none px-5 py-3 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200";
            document.getElementById('btn-tab-cms').className = "flex-1 md:flex-none px-5 py-3 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200";
            document.getElementById('btn-'+t).className = "flex-1 md:flex-none px-5 py-3 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-md";
        }

        async function fetchOrders() {
            try {
                const res = await fetch(API_URL + "/api/orders"); ordersDb = await res.json();
                renderOrders(); showToast("Dữ liệu đã cập nhật!", "success");
            } catch(e) { showToast("Lỗi kết nối API!", "error"); }
        }

        async function fetchOrdersSilently() {
            try {
                const res = await fetch(API_URL + "/api/orders");
                const newData = await res.json();
                if(JSON.stringify(newData) !== JSON.stringify(ordersDb)) {
                    ordersDb = newData; renderOrders();
                    showToast("Vừa có đơn hàng mới hoặc cập nhật!", "info");
                }
            } catch(e) {}
        }

        function renderOrders() {
            const tbody = document.getElementById('orderTable'); tbody.innerHTML = '';
            ordersDb.forEach((o) => {
                let badge = o.status === 'pending' ? '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">⏳ Chờ duyệt</span>' : 
                            (o.status === 'success' ? '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200">✅ Thành công</span>' : 
                            '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold border border-red-200">❌ Từ chối</span>');
                
                let supportTag = o.needSupport ? `<span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded ml-2 font-bold uppercase border border-blue-200">Hỗ trợ</span>` : '';

                tbody.innerHTML += `<tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-4 md:p-5 font-mono font-bold text-indigo-600">${o.id}</td>
                    <td class="p-4 md:p-5"><p class="font-bold text-slate-800">${o.email} ${supportTag}</p><p class="text-xs text-slate-500 mt-1"><i class="fas fa-credit-card mr-1"></i>${o.method || 'Bank'} | Zalo: ${o.zalo || 'Không'}</p></td>
                    <td class="p-4 md:p-5 font-bold text-slate-600 text-xs truncate max-w-[200px]">${o.pkg}</td><td class="p-4 md:p-5">${badge}</td>
                    <td class="p-4 md:p-5 text-right whitespace-nowrap">
                        <button onclick="openEditModal('${o.id}')" class="text-indigo-600 font-bold hover:underline px-3 py-1 bg-indigo-50 rounded mr-2"><i class="fas fa-edit mr-1"></i>Sửa</button>
                        <button onclick="deleteOrder('${o.id}')" class="text-red-500 font-bold hover:underline px-3 py-1 bg-red-50 rounded"><i class="fas fa-trash-alt mr-1"></i>Xóa</button>
                    </td></tr>`;
            });
        }

        function openEditModal(id) {
            let o;
            if(id) {
                o = ordersDb.find(x => x.id === id);
                document.getElementById('modalTitle').innerText = `Sửa Đơn Hàng`;
                document.getElementById('editId').value = o.id;
            } else {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let newId = 'DH-'; for(let i=0; i<10; i++) newId += chars.charAt(Math.floor(Math.random()*chars.length));
                o = { id: newId, email: '', pkg: packageOptions[0], status: 'pending', info: '', reason: '' };
                document.getElementById('modalTitle').innerText = `Tạo Đơn Thủ Công`;
                document.getElementById('editId').value = o.id;
            }
            
            document.getElementById('editEmail').value = o.email || '';
            
            // Tìm và set đúng tên gói trong Dropbox
            let foundPkg = false;
            for(let i=0; i<document.getElementById('editPkg').options.length; i++) {
                if(document.getElementById('editPkg').options[i].value.includes(o.pkg)) {
                    document.getElementById('editPkg').selectedIndex = i; foundPkg = true; break;
                }
            }
            if(!foundPkg) document.getElementById('editPkg').selectedIndex = 0;

            document.getElementById('editStatus').value = o.status;
            document.getElementById('editLink').value = o.info || '';
            document.getElementById('editReason').value = o.reason || '';
            toggleStatusFields(); document.getElementById('modalEdit').classList.remove('hidden');
        }

        function toggleStatusFields() {
            const s = document.getElementById('editStatus').value;
            document.getElementById('fieldSuccess').classList.toggle('hidden', s !== 'success');
            document.getElementById('fieldFailed').classList.toggle('hidden', s !== 'failed');
        }

        async function saveOrderToCloud() {
            const id = document.getElementById('editId').value;
            let o = ordersDb.find(x => x.id === id);
            if(!o) { o = { id: id, needSupport: false, date: new Date().toLocaleString() }; ordersDb.unshift(o); }

            o.email = document.getElementById('editEmail').value;
            o.pkg = document.getElementById('editPkg').value;
            o.status = document.getElementById('editStatus').value;
            o.info = document.getElementById('editLink').value;
            o.reason = document.getElementById('editReason').value;

            const btn = event.target; const oldTxt = btn.innerText; btn.innerText = "ĐANG LƯU..."; btn.disabled = true;

            try {
                await fetch(API_URL + "/api/orders", { method: "POST", body: JSON.stringify(ordersDb) });
                showToast("Đã đồng bộ lên hệ thống Cloud!", "success");

                // GỬI EMAIL CHO KHÁCH (ĐÃ SỬA EMAIL RESPONSIVE CHO MOBILE)
                if(document.getElementById('sendMailCheck').checked && o.email) {
                    btn.innerText = "ĐANG BẮN EMAIL...";
                    let subject = "Trinh Hg VPN - Cập nhật đơn hàng"; let msg = "";
                    let contactBlock = `<div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:15px; margin-top:20px; text-align:center;">
                        <p style="margin:0 0 10px 0; color:#475569; font-size:13px; line-height:1.5;">${o.needSupport ? '<span style="color:#ef4444; font-weight:bold;">Bạn đã yêu cầu Admin hỗ trợ cài đặt!</span> Vui lòng liên hệ:' : 'Cần hỗ trợ? Đội ngũ của chúng tôi sẵn sàng 24/7'}</p>
                        <a href="https://zalo.me/0917678211" style="display:inline-block; background:#0ea5e9; color:white; padding:10px 16px; text-decoration:none; border-radius:6px; font-weight:bold; margin-bottom:5px; font-size:13px;">Chat Zalo</a>
                        <a href="https://www.facebook.com/trinh.hg.57" style="display:inline-block; background:#3b82f6; color:white; padding:10px 16px; text-decoration:none; border-radius:6px; font-weight:bold; font-size:13px;">Messenger</a>
                    </div>`;

                    if(o.status === 'success') {
                        subject = "Trinh Hg VPN - Kích hoạt dịch vụ thành công";
                        msg = `
                        <div style="font-family:sans-serif; width:100%; max-width:500px; margin:auto; background:#ffffff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden; box-sizing:border-box;">
                            <div style="background:linear-gradient(135deg, #4f46e5, #9333ea); padding:20px; text-align:center;">
                                <h2 style="color:white; margin:0; font-size:20px;">KÍCH HOẠT THÀNH CÔNG</h2>
                            </div>
                            <div style="padding:20px; box-sizing:border-box;">
                                <p style="font-size:14px; line-height:1.5;">Xin chào, Gói VPN <b>${o.pkg}</b> của bạn đã sẵn sàng.</p>
                                <div style="background:#f1f5f9; border-left:4px solid #4f46e5; padding:15px; border-radius:8px; margin:20px 0; text-align:center; word-break:break-all;">
                                    <p style="margin:0; font-size:11px; color:#64748b; font-weight:bold;">MÃ ĐƠN HÀNG</p>
                                    <p style="margin:5px 0 0 0; font-size:22px; font-weight:900; color:#4f46e5; letter-spacing:1px;">${o.id}</p>
                                </div>
                                <div style="text-align:center; margin:20px 0;">
                                    <a href="https://vpntrinhhg.pages.dev" style="background:#1e293b; color:white; padding:12px 20px; border-radius:8px; text-decoration:none; font-weight:bold; display:inline-block; max-width:100%; box-sizing:border-box; font-size:14px;">TRUY CẬP CỔNG KHÁCH HÀNG</a>
                                    <p style="font-size:12px; color:#64748b; margin-top:12px; line-height:1.5;">👉 <i>Tra cứu bằng <b>Mã Đơn Hàng</b> hoặc <b>Email</b> để lấy Link VPN.</i></p>
                                </div>
                                ${contactBlock}
                            </div>
                        </div>`;
                    } else if(o.status === 'failed') {
                        subject = "Trinh Hg VPN - Đơn hàng bị từ chối";
                        msg = `<div style="font-family:sans-serif; width:100%; max-width:500px; margin:auto; border:1px solid #fecaca; border-radius:12px; overflow:hidden; box-sizing:border-box;">
                            <div style="background:#ef4444; padding:20px; text-align:center;"><h2 style="color:white; margin:0; font-size:20px;">Giao dịch thất bại</h2></div>
                            <div style="padding:20px; box-sizing:border-box;">
                                <p style="font-size:14px; line-height:1.5;">Xin chào, Đơn hàng <b>${o.id}</b> của bạn không thể kích hoạt.</p>
                                <div style="background:#fef2f2; border:1px solid #fca5a5; padding:15px; border-radius:8px; color:#b91c1c; font-weight:bold; margin:20px 0; font-size:14px; word-wrap:break-word;">Lý do: ${o.reason}</div>
                                ${contactBlock}
                            </div></div>`;
                    }

                    await fetch(GOOGLE_MAIL_API, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({to: o.email, subject: subject, html: msg}) });
                }
            } catch(e) { showToast("Lỗi khi kết nối hệ thống!", "error"); }

            btn.innerText = oldTxt; btn.disabled = false;
            renderOrders(); document.getElementById('modalEdit').classList.add('hidden');
        }

        async function deleteOrder(id) {
            if(confirm('Xóa vĩnh viễn đơn ' + id + '?')) {
                ordersDb = ordersDb.filter(x => x.id !== id);
                try {
                    await fetch(API_URL + "/api/orders", { method: "POST", body: JSON.stringify(ordersDb) });
                    renderOrders(); showToast("Đã xóa vĩnh viễn!", "info");
                } catch(e) { showToast("Lỗi khi xóa!", "error"); }
            }
        }

        // --- CMS ---
        async function fetchCms() {
            try {
                const res = await fetch(API_URL + "/api/cms"); cmsDb = await res.json();
                document.getElementById('cmsGuide').value = cmsDb[currentCmsDevice] || '';
            } catch(e) {}
        }

        function changeCmsDevice(dev) {
            document.querySelectorAll('.dev-btn').forEach(b => { b.classList.remove('active', 'border-indigo-500', 'bg-indigo-50', 'text-indigo-700'); b.classList.add('border-slate-200', 'text-slate-600'); });
            document.getElementById('cms-btn-' + dev).classList.add('active', 'border-indigo-500', 'bg-indigo-50', 'text-indigo-700'); document.getElementById('cms-btn-' + dev).classList.remove('border-slate-200', 'text-slate-600');
            currentCmsDevice = dev; document.getElementById('cmsGuide').value = cmsDb[dev] || '';
        }

        function insertMacro(type) {
            const box = document.getElementById('cmsGuide'); let str = "";
            if(type === 'btn') str = `<a href="LINK-APP" target="_blank" style="display:inline-block; background:#4f46e5; color:white; padding:10px 18px; border-radius:8px; font-weight:bold; text-decoration:none; margin-right:8px; margin-bottom:8px; font-size:14px;">⬇️ TẢI APP</a>\n`;
            if(type === 'title') str = `\n<h3 style="font-size: 16px; font-weight: bold; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-top: 20px;">Tiêu đề hướng dẫn</h3>\n`;
            if(type === 'step') str = `<p style="margin-bottom: 8px;"><b>Bước 1:</b> Viết nội dung...</p>\n`;
            if(type === 'img') str = `\n<img src="LINK-ANH-JPG" style="max-width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #ccc;" />\n`;
            box.value += str;
        }

        async function saveCmsToCloud() {
            cmsDb[currentCmsDevice] = document.getElementById('cmsGuide').value;
            const btn = event.target; const oldTxt = btn.innerText; btn.innerText = "ĐANG LƯU..."; btn.disabled = true;
            try {
                await fetch(API_URL + "/api/cms", { method: "POST", body: JSON.stringify(cmsDb) });
                showToast('Đã lưu bài viết lên hệ thống Cloud!', "success");
            } catch(e) { showToast("Lỗi khi lưu CMS!", "error"); }
            btn.innerText = oldTxt; btn.disabled = false;
        }
    </script>
</body>
</html>
