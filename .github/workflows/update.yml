name: Update VPN Subs Automatically

on:
  schedule:
    - cron: '*/60 * * * *'
  workflow_dispatch:

jobs:
  update-subs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pyyaml

      - name: Run Script
        run: python update_sub.py
