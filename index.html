        let lang = 'vi'; let currentPackage = null; let currentOrderId = ''; let cmsCache = {};

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bg = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-blue-500' : 'bg-green-500');
            const icon = type === 'error' ? 'fa-times-circle' : (type === 'info' ? 'fa-info-circle' : 'fa-check-circle');
            toast.className = `${bg} text-white px-4 md:px-5 py-3 rounded-xl shadow-xl flex items-center transform transition-all duration-300 translate-x-full opacity-0 w-[90vw] max-w-sm mb-2`;
            toast.innerHTML = `<i class="fas ${icon} text-base md:text-lg mr-2 shrink-0"></i><span class="font-bold text-xs md:text-sm leading-tight">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // HÀM DỊCH
        function changeLanguage(val) {
            lang = val;
            // Đồng bộ 2 select mobile và pc
            document.getElementById('langSelectMobile').value = val;
            document.getElementById('langSelectDesktop').value = val;

            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = i18n[lang][el.getAttribute('data-i18n')]; });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')]; });
            
            renderPackages('all');
            
            // Cập nhật lại giá tiền và render lại Payment UI ngay lập tức nếu đang mở form checkout
            if (currentPackage && !document.getElementById('checkoutSection').classList.contains('hidden')) {
                document.getElementById('selectedPackageName').innerText = currentPackage[lang].name + ` (${currentPackage.data})`;
                document.getElementById('selectedPackagePrice').innerText = currentPackage[lang].price;
                renderPaymentBox(); // Hàm render lại hộp QR bên phải
            }
        }

        function genHTML(pkg) {
            const l = i18n[lang]; const p = pkg[lang];
            return `<div class="bg-white p-5 md:p-8 rounded-2xl md:rounded-3xl border border-slate-100 shadow-sm relative flex flex-col justify-between">

                        <li><i class="fas fa-check-circle text-green-500 mr-1.5"></i>${l.data_label} <b>${pkg.data}</b></li>
                        <li><i class="fas fa-check-circle text-green-500 mr-1.5"></i>${l.dev_label}</li>
                        <li><i class="fas fa-check-circle text-green-500 mr-1.5"></i>${l.speed_label}</li>
                    </ul>
                </div>
                <button onclick="openCheckout('${pkg.id}')" class="w-full bg-indigo-50 text-indigo-700 font-bold py-3 rounded-xl text-sm md:text-base hover:bg-indigo-600 hover:text-white transition">${l.btn_buy}</button>
            </div>`;
        }

        function renderPackages(filter) {
            // Cập nhật class Tab
            ['htab', 'ptab'].forEach(prefix => {
                ['all', 'cycle', 'usage'].forEach(t => {
                    const btn = document.getElementById(`${prefix}-${t}`);
                    if(btn) {
                        if(t === filter) { btn.classList.add('active', 'bg-indigo-600', 'text-white'); btn.classList.remove('text-slate-600'); } 
                        else { btn.classList.remove('active', 'bg-indigo-600', 'text-white'); btn.classList.add('text-slate-600'); }
                    }
                });
            });

            const html = pkgs.filter(p => filter==='all' || p.type===filter).map(genHTML).join('');
            document.getElementById('packagesContainerHome').innerHTML = html;
            document.getElementById('packagesContainerPortal').innerHTML = html;
        }

        function openCheckout(id) {
            currentPackage = pkgs.find(p => p.id === id);
            const checkout = document.getElementById('checkoutSection');
            if(document.getElementById('view-portal').classList.contains('active')) document.getElementById('view-portal').appendChild(checkout);
            else document.getElementById('view-store').appendChild(checkout);
            checkout.classList.remove('hidden'); checkout.scrollIntoView({ behavior: 'smooth' });
            
            document.getElementById('selectedPackageName').innerText = currentPackage[lang].name + ` (${currentPackage.data})`;
            document.getElementById('selectedPackagePrice').innerText = currentPackage[lang].price;
            
            currentOrderId = '';
            renderPaymentBox(); // Render Default Guide UI
        }

        function cancelCheckout() { document.getElementById('checkoutSection').classList.add('hidden'); }
        function toggleZalo() { const z = document.getElementById('cusZalo'); z.classList.toggle('hidden'); z.required = !z.classList.contains('hidden'); }
        
        // SỰ KIỆN KHI ĐỔI CỔNG THANH TOÁN (UPDATE DYNAMIC QR)
        function changePayMethod() {
            const m = document.getElementById('payMethod').value;
            if(m !== 'bank') { document.getElementById('needSupport').checked = true; toggleZalo(); }
            renderPaymentBox();
        }

        // HÀM RENDER KHỐI BÊN PHẢI (HƯỚNG DẪN HOẶC MÃ QR)
        function renderPaymentBox() {
            const col = document.getElementById('checkoutRightCol');
            const m = document.getElementById('payMethod').value;
            const btn = document.getElementById('btnConfirm');

            // NẾU CHƯA TẠO ĐƠN (CHƯA CÓ ID) -> HIỆN HƯỚNG DẪN
            if(!currentOrderId) {
                btn.innerText = i18n[lang].btn_create_order;
                btn.className = 'w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 md:py-4 px-2 rounded-xl text-sm md:text-lg uppercase transition mt-6';
                
                col.innerHTML = `<h4 class="font-extrabold text-base md:text-lg mb-4 flex items-center text-slate-800"><i class="fas fa-info-circle text-indigo-500 mr-2 text-xl"></i>${i18n[lang].guide_title}</h4>
                <p class="text-sm text-slate-600 mb-4">${i18n[lang].guide_desc}</p>
                <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl text-xs md:text-sm text-indigo-800 font-medium">👉 ${lang==='vi'?'Hệ thống hỗ trợ tự động check qua Bank VN. Alipay/WeChat vui lòng liên hệ Admin.':'System supports auto-check via Bank. Alipay/WeChat requires manual contact.'}</div>`;
                return;
            }

            // NẾU ĐÃ TẠO ĐƠN -> HIỆN QR VÀ LỆNH THANH TOÁN THEO CỔNG
            btn.innerText = i18n[lang].btn_paid;
            btn.className = 'w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 md:py-4 px-2 rounded-xl shadow-lg text-sm md:text-lg uppercase transition';

            if(m === 'bank') {
                col.innerHTML = `<div class="text-center w-full">
                    <div class="bg-indigo-50 p-2 rounded-xl inline-block mb-4"><img src="https://img.vietqr.io/image/mbbank-0917678211-compact.png?amount=${currentPackage.vnd}&addInfo=${currentOrderId}&accountName=TRINH THI XUAN HUONG" class="w-48 h-48 md:w-56 md:h-56 mx-auto rounded-xl shadow-sm mix-blend-multiply"></div>
                    <div class="w-full text-left text-sm space-y-2 mb-4">
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100"><span class="text-slate-500">Chủ TK:</span><strong class="text-slate-800">TRINH THI XUAN HUONG</strong></div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100"><span class="text-slate-500">Số TK:</span><strong class="text-indigo-600 font-bold bg-indigo-50 px-2 py-1 rounded cursor-pointer" onclick="copyText('0917678211')">0917678211 <i class="far fa-copy ml-1"></i></strong></div>
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100"><span class="text-slate-500">${i18n[lang].copy_amount}</span><strong class="text-red-500 font-black text-lg">${currentPackage.vi.price}</strong></div>
                    </div>
                    <div class="bg-yellow-50 py-3 px-2 rounded-xl text-center w-full border border-yellow-200">
                        <span class="block text-slate-600 text-[10px] font-bold mb-1 uppercase">${i18n[lang].copy_memo}</span>
                        <strong class="block w-full bg-white text-slate-800 font-mono text-lg md:text-xl py-2 rounded-lg cursor-pointer border border-slate-200 shadow-sm" onclick="copyText('${currentOrderId}')">${currentOrderId} <i class="far fa-copy"></i></strong>
                    </div>
                </div>`;
            } else if (m === 'alipay') {
                col.innerHTML = `<div class="text-center w-full">
                    <h4 class="font-extrabold text-slate-800 text-base md:text-lg mb-4 flex justify-center items-center"><i class="fas fa-qrcode text-indigo-500 mr-2"></i>Alipay / WeChat Pay</h4>
                    <div class="flex justify-center gap-4 mb-6">
                        <div class="text-center bg-white p-2 rounded-xl border border-slate-100 shadow-sm"><img src="./alipay.jpg" class="w-28 h-28 md:w-32 md:h-32 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/150?text=ALIPAY+QR'"><p class="text-[10px] md:text-xs font-bold mt-2 text-blue-600 bg-blue-50 py-1 rounded">Alipay</p></div>
                        <div class="text-center bg-white p-2 rounded-xl border border-slate-100 shadow-sm"><img src="./wechat.jpg" class="w-28 h-28 md:w-32 md:h-32 rounded-lg object-cover" onerror="this.src='https://via.placeholder.com/150?text=WECHAT+QR'"><p class="text-[10px] md:text-xs font-bold mt-2 text-green-600 bg-green-50 py-1 rounded">WeChat</p></div>
                    </div>
                    <div class="w-full text-left text-sm mb-4">
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100"><span class="text-slate-500">${i18n[lang].copy_amount}</span><strong class="text-red-500 font-black text-xl md:text-2xl">${currentPackage.cny} CNY</strong></div>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 text-center w-full">
                        <span class="block text-slate-600 text-[10px] font-bold mb-1 uppercase">${i18n[lang].copy_memo}</span>
                        <strong class="block w-full bg-white text-slate-800 font-mono text-lg md:text-xl py-2 rounded-lg cursor-pointer border border-slate-200 shadow-sm mb-2" onclick="copyText('${currentOrderId}')">${currentOrderId} <i class="far fa-copy ml-1"></i></strong>
                        <p class="text-[10px] md:text-xs text-red-500 font-bold">${lang==='zh'?'请手动输入金额和订单号！':(lang==='en'?'Please manually enter the amount and Memo!':'Vui lòng tự nhập số tiền và nội dung chuyển khoản!')}</p>
                    </div>
                </div>`;
            } else {
                col.innerHTML = `<div class="text-center w-full bg-slate-100 py-10 rounded-2xl border border-slate-200"><i class="fas fa-headset text-4xl text-slate-400 mb-3"></i><h3 class="text-xl font-black text-slate-700 mb-2">Contact Admin</h3><p class="text-sm text-slate-500 px-4">After you click "I Have Paid", admin will contact your Zalo/Telegram to provide Crypto wallet.</p></div>`;
            }
        }

        function copyText(t) { navigator.clipboard.writeText(t); showToast(lang === 'vi' ? 'Đã Copy!' : 'Copied!', 'success'); }

        async function submitOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('btnConfirm');
            
            if(!currentOrderId) {
                // TẠO MÃ ĐƠN MỚI
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; currentOrderId = 'DH-'; for(let i=0; i<10; i++) currentOrderId += chars.charAt(Math.floor(Math.random()*chars.length));
                renderPaymentBox(); // Render QR sau khi có ID
                showToast(lang === 'vi' ? "Đã tạo mã thanh toán!" : "Payment details generated!", "info");
                
                // NGẦM GỬI EMAIL THÔNG BÁO CHO ADMIN CÓ KHÁCH ĐẶT FORM 
                try {
                    await fetch(GOOGLE_MAIL_API, { 
                        method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({
                            to: "lucastanora@gmail.com", 
                            subject: `[Unidy VPN] CÓ KHÁCH TẠO ĐƠN: ${currentOrderId}`, 
                            html: `<h3 style="color:#4f46e5;">Có khách vừa ấn tạo Form chuyển khoản</h3><p>Mã đơn: <b>${currentOrderId}</b></p><p>Gói: ${currentPackage.vi.name}</p><p>Email khách: ${document.getElementById('cusEmail').value}</p><p>Vui lòng mở trang Admin để kiểm tra và duyệt nếu tiền về!</p>`
                        }) 
                    });
                } catch(e) {}
            } else {
                // BẮN LÊN API CLOUDFLARE
                btn.innerText = "LOADING..."; btn.disabled = true;
                try {
                    let dbRes = await fetch(API_URL + "/api/orders"); let db = await dbRes.json();
                    
                    // Lưu lại tên gói đúng chuẩn Admin: "Gói 1 Tháng - 70.000đ / 3$ (1000GB)"
                    const fullPkgName = `${currentPackage.vi.name} - ${currentPackage.vi.price} / ${currentPackage.usd}$ (${currentPackage.data})`;

                    db.unshift({ 
                        id: currentOrderId, email: document.getElementById('cusEmail').value, zalo: document.getElementById('cusZalo').value, 
                        method: document.getElementById('payMethod').value, pkg: fullPkgName, 
                        needSupport: document.getElementById('needSupport').checked,
                        status: 'pending', date: new Date().toLocaleString() 
                    });
                    
                    await fetch(API_URL + "/api/orders", { method: "POST", body: JSON.stringify(db) });
                    
                    showToast(lang === 'vi' ? "Gửi đơn thành công!" : "Order submitted!", "success");
                    cancelCheckout(); document.getElementById('orderForm').reset();
                    document.getElementById('loginInput').value = currentOrderId; login(true);
                } catch(e) { 
                    showToast(lang === 'vi' ? "Lỗi mạng! Thử lại sau." : "Network Error!", "error"); 
                    btn.innerText = "LỖI / ERROR"; 
                }
                btn.disabled = false;
            }
        }

        async function login(silent = false) {
            const input = document.getElementById('loginInput').value.trim().toUpperCase(); if(!input) return;
            
            try {
                let dbRes = await fetch(API_URL + "/api/orders"); let db = await dbRes.json();
                let o = db.find(x => x.id.toUpperCase() === input || (x.email && x.email.toUpperCase() === input));
                if(!o) { showToast(lang==='vi'?'Không tìm thấy Đơn hàng/Email này!':(lang==='en'?'Order not found!':'未找到订单'), 'error'); return; }

                localStorage.setItem(SESSION_KEY, JSON.stringify({ id: o.id, time: new Date().getTime() }));
                if(!silent) showToast(lang==='vi'?'Vào cổng thành công!':(lang==='en'?'Login success!':'登录成功'), "info");

                document.getElementById('view-store').classList.remove('active'); document.getElementById('view-portal').classList.add('active');
                document.getElementById('userMenu').classList.remove('hidden'); document.getElementById('checkoutSection').classList.add('hidden');
                document.getElementById('portalOrderId').innerText = o.id;

                const st = document.getElementById('portalStatus');
                document.getElementById('portalContentPending').classList.toggle('hidden', o.status !== 'pending');
                document.getElementById('portalContentSuccess').classList.toggle('hidden', o.status !== 'success');
                
                if(o.status === 'pending') st.innerHTML = '<span class="text-yellow-700 bg-yellow-100 px-3 py-1 rounded-full text-xs font-bold uppercase">Pending / 待处理</span>';
                else if (o.status === 'success') {
                    st.innerHTML = '<span class="text-green-700 bg-green-100 px-3 py-1 rounded-full text-xs font-bold uppercase">Active / 已激活</span>';
                    document.getElementById('subLink').value = o.info || '';
                    
                    let cmsRes = await fetch(API_URL + "/api/cms"); cmsCache = await cmsRes.json();
                    showGuide('android');
                } else st.innerHTML = `<span class="text-red-700 bg-red-100 px-3 py-1 rounded-full text-xs font-bold uppercase">Rejected / 拒绝</span>`;
                
                renderPackages('all'); window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch(e) { showToast("Network Error!", "error"); }
        }

        function logout() {
            localStorage.removeItem(SESSION_KEY); document.getElementById('view-portal').classList.remove('active'); document.getElementById('view-store').classList.add('active');
            document.getElementById('userMenu').classList.add('hidden'); document.getElementById('loginInput').value = '';
        }

        function showGuide(dev) {
            document.querySelectorAll('.dev-btn').forEach(b => { b.classList.remove('active', 'border-indigo-500'); });
            document.getElementById('btn-dev-' + dev).classList.add('active', 'border-indigo-500');
            document.getElementById('guideContent').classList.remove('hidden');
            document.getElementById('guideText').innerHTML = cmsCache[dev] || '<p class="text-center py-6 md:py-10 text-slate-500 font-bold text-xs md:text-sm">Guide is updating...</p>';
        }

        function copyToClipboard(id) { const e = document.getElementById(id); e.select(); document.execCommand('copy'); showToast(lang==='vi'?'Đã copy Link!':(lang==='en'?'Copied URL!':'已复制'), 'success'); }

        let lastCheckedStatus = '';
        window.onload = function() {
            changeLanguage('vi'); // Khởi tạo Tab & Ngôn ngữ mặc định
            const session = localStorage.getItem(SESSION_KEY);
            if(session) {
                const data = JSON.parse(session);
                if(new Date().getTime() - data.time < 24*3600*1000) { document.getElementById('loginInput').value = data.id; login(true); } 
                else localStorage.removeItem(SESSION_KEY);
            }
            
            // POLLING ĐỂ REAL-TIME TỰ CHỚP SANG THÀNH CÔNG NẾU ĐANG Ở CỔNG KHÁCH HÀNG
            setInterval(async () => {
                if(document.getElementById('view-portal').classList.contains('active')) {
                    const input = document.getElementById('loginInput').value;
                    try {
                        let dbRes = await fetch(API_URL + "/api/orders"); let db = await dbRes.json();
                        let o = db.find(x => x.id === input);
                        if(o && o.status !== lastCheckedStatus) {
                            lastCheckedStatus = o.status;
                            login(true); // Load lại màn hình Portal
                        }
                    } catch(e) {}
                }
            }, 10000);
        }
    </script>
</body>
</html>
